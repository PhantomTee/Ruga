<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#FF1515"/>
  <!-- Skull cranium -->
  <ellipse cx="16" cy="13" rx="10" ry="10.5" fill="#000"/>
  <!-- Jaw -->
  <rect x="9.5" y="20" width="13" height="7" rx="2" fill="#000"/>
  <!-- Eye sockets -->
  <ellipse cx="11.5" cy="12.5" rx="3.2" ry="3.8" fill="#FF1515"/>
  <ellipse cx="20.5" cy="12.5" rx="3.2" ry="3.8" fill="#FF1515"/>
  <!-- Nose cavity -->
  <path d="M14.2 17.5 L16 20 L17.8 17.5 Z" fill="#FF1515"/>
  <!-- Teeth -->
  <rect x="10" y="21.5" width="2.8" height="3.5" rx="0.5" fill="#FF1515"/>
  <rect x="14" y="21.5" width="2.8" height="3.5" rx="0.5" fill="#FF1515"/>
  <rect x="18" y="21.5" width="2.8" height="3.5" rx="0.5" fill="#FF1515"/>
  <!-- Skull outline stroke -->
  <ellipse cx="16" cy="13" rx="10" ry="10.5" fill="none" stroke="#FF1515" stroke-width="0.5"/>
</svg>
